version: 1.0
runtime: nodejs18
build:
  commands:
    build:
      - echo "Installing dependencies..."
      - npm install
      - echo "Building server..."
      - cd server && npm install && npm run build
      - echo "Building client..."
      - cd ../client && npm install && npm run build
      - cd ..
      - echo "Build complete!"
run:
  runtime-version: 18
  command: node server/dist/index.js
  network:
    port: 3001
    env: PORT
  env:
    - name: NODE_ENV
      value: production