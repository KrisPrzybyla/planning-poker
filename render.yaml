services:
  - type: web
    name: planning-poker
    env: node
    buildCommand: |
      npm install &&
      cd server && npm install && npm run build &&
      cd ../client && npm install && npm run build &&
      cd ..
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /health
    autoDeploy: true